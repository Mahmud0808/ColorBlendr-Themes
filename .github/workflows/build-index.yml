name: Build index

on:
  push:
    branches: [main]
    paths:
      - "themes/**"
      - "scripts/**"
  schedule:
    # Daily: refresh vote/download counts baked into index.json.
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/validate.mjs
      - run: node scripts/build-index.mjs
        env:
          WORKER_URL: ${{ vars.WORKER_URL }}
      - name: Commit index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet || git commit -m "Rebuild index.json"
          git push
      - name: Purge jsDelivr cache
        # GitHub's raw endpoint caches ~5 minutes; purging too early makes
        # jsDelivr re-cache stale content. Wait it out, then purge until the
        # CDN matches the freshly built index.
        run: |
          expected=$(sha256sum index.json | cut -d' ' -f1)
          for attempt in 1 2 3; do
            sleep 75
            response=$(curl -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/index.json" || true)
            sleep 10
            actual=$(curl -fsSL "https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/index.json" | sha256sum | cut -d' ' -f1)
            if [ "$actual" = "$expected" ]; then
              echo "CDN fresh after $attempt attempt(s)"
              exit 0
            fi
            # Purge API allows only a few purges per file per hour; once
            # throttled, retrying is pointless — the next run catches up.
            if echo "$response" | grep -q '"throttled": *true'; then
              echo "::warning::Purge throttled; CDN refreshes when the throttle resets"
              exit 0
            fi
          done
          echo "::warning::CDN still stale after retries; will catch up on next run"
          exit 0
