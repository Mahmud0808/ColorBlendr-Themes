name: Build index

on:
  push:
    branches: [main]
    paths:
      - "themes/**"
      - "scripts/**"
  schedule:
    # Daily: refresh vote/download counts baked into index.json.
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/validate.mjs
      - run: node scripts/build-index.mjs
        env:
          WORKER_URL: ${{ vars.WORKER_URL }}
      - name: Commit index.json
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Rebuild index.json"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Purge jsDelivr cache
        # Runs only when the index changed — every hit on the purge API costs
        # quota (a few per file per hour), even "just checking".
        if: steps.commit.outputs.changed == 'true'
        run: |
          expected=$(sha256sum index.json | cut -d' ' -f1)

          # Purging while GitHub's raw endpoint (jsDelivr's upstream) still
          # serves stale content would re-cache the old index for 12h. Wait
          # until raw is fresh — usually seconds, up to its ~5 min cache TTL.
          for i in $(seq 1 30); do
            raw=$(curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/main/index.json" | sha256sum | cut -d' ' -f1)
            [ "$raw" = "$expected" ] && break
            sleep 10
          done
          if [ "$raw" != "$expected" ]; then
            echo "::warning::Raw endpoint still stale; skipping purge (next run catches up)"
            exit 0
          fi

          # Purge exactly once — edges can take a minute to drop the old copy,
          # and re-purging only burns the hourly throttle quota.
          response=$(curl -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/index.json" || true)
          echo "$response"
          if echo "$response" | grep -q '"throttled": *true'; then
            echo "::warning::Purge throttled; CDN refreshes when the throttle resets"
            exit 0
          fi

          for i in $(seq 1 12); do
            sleep 10
            actual=$(curl -fsSL "https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/index.json" | sha256sum | cut -d' ' -f1)
            if [ "$actual" = "$expected" ]; then
              echo "CDN fresh after $((i * 10))s"
              exit 0
            fi
          done
          echo "::warning::CDN not confirmed fresh within 2 min; edges usually catch up shortly"
          exit 0
