name: Notify owner

# PRs are opened with the owner's own token, and GitHub never notifies you
# about your own activity. A bot comment that @mentions the owner does.
on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  mention:
    runs-on: ubuntu-latest
    steps:
      - name: Mention owner on the new submission
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR" --repo "$REPO" \
            --body "@Mahmud0808 New theme submission awaiting review."
