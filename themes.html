<body>
<div class="wrap">
  <header class="hero" style="padding-bottom: 8px;">
    <h1 class="title">All creations</h1>
    <p class="tagline">Every theme the community has shared. Open one to view it or apply it in the app.</p>
    <div class="cta">
      <a class="btn tonalbtn backbtn" href="index.html"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="m10.87 18.87-6.16-6.16c-.39-.39-.39-1.03 0-1.42l6.16-6.16c.63-.62 1.71-.18 1.71.71v3.16h6.42c.55 0 1 .45 1 1v4c0 .55-.45 1-1 1h-6.42v3.16c0 .89-1.08 1.33-1.71.71Z"/></svg>Home</a>

  <div class="toolbar">

        <button class="menuitem" role="option" data-value="trending">Trending</button>
        <button class="menuitem" role="option" data-value="upvotes">Top voted</button>
        <button class="menuitem" role="option" data-value="downloads">Most applied</button>
        <button class="menuitem" role="option" data-value="latest">Newest</button>
      </div>
    </div>
  </div>

  <div id="grid" class="themes-grid"><div class="loading">Loading themes</div></div>

  <footer>
    <span>Open source</span><span class="sep"></span><span>No accounts</span><span class="sep"></span><span>No tracking</span><span class="sep"></span><a href="https://github.com/Mahmud0808/ColorBlendr">GitHub</a><span class="sep"></span><a href="https://t.me/DrDsProjects">Telegram</a>
